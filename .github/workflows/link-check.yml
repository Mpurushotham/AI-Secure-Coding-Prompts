name: link-check

# Verify every relative Markdown link in the repo resolves. Keeps the README
# index and cross-references honest as prompts are added.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: this job only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2 pinned by commit SHA (tags are mutable).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check Markdown links
        run: bash scripts/check-links.sh
